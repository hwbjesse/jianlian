name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller requests wxauto uiautomation

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --name WeChatBot bot_connector.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeChatBot
          path: dist/WeChatBot.exe

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/WeChatBot.exe
